# CI-Gate (T-345): erzwingt Tests + Lint + tsc/Build bei jedem Push/PR, bevor deployt wird.
# Vorher lief NICHTS automatisch — Deploy aus dem lokalen Working-Tree, kein Audit-Trail.
# Deployt wird weiterhin manuell (Coolify aus origin/main); CI ist das Qualitäts-Gate davor.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test

  frontend:
    name: Frontend (lint + tsc + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      # build = tsc --noEmit + vite build; Git-SHA ins Bundle (X-FE-Version, Audit-Trail welcher Stand läuft)
      - run: npm run build
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
